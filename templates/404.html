{% extends "base.html" %}
{% block title %}{{ t('404.title') }} — {{ t('site.name') }}{% endblock %}

{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:4rem var(--gutter);">
    <div>
        <div style="font-size:clamp(4rem,12vw,7rem);font-weight:900;color:var(--brand);line-height:1;margin-bottom:0.375rem;">404</div>
        <h1 style="font-size:var(--fs-700);margin-bottom:0.75rem;">{{ t('404.title') }}</h1>
        <p style="color:var(--muted);max-width:380px;margin:0 auto 2rem;">{{ t('404.desc') }}</p>
        <a href="/" class="btn btn-brand nav-link">{{ t('404.btn') }}</a>
    </div>
</div>
{% endblock %}

services:
  - type: web
    name: fpbu-beach-wrestling
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_SENDER
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_RECIPIENT
        sync: false
      - key: ADMIN_USERS
        sync: false
